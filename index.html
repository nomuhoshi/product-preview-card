<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="style.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>






<body>
  <div class="card">
  <img src="images\image-product-desktop.jpg" alt="product" class="product-image">
  <div class="product-info">
    <p class="category">Perfume</p>
    <h1>Gabrielle Essence Eau De Parfum</h1>
    <p class="description">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
  Perfumer-Creator for the House of CHANEL.</p>
      <div class="price">
        <p class="price-new">$149.99</p>
        <p class="price-old">$169.99</p>

      </div>
      <button>
        <img src="./images/icon-cart.svg" alt="cart">
        Add to Cart
      </button>

  </div>

</div>

 

  
</body>
</html>
